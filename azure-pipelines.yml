trigger:
  branches:
    include:
      - develop

pr: none

variables:
  nodeVersion: "24.x"
  azureServiceConnection: "8287475a-4f2f-4710-91f6-3c9f9fb6f19e"
  windowsWebAppName: "attg-dahsboard-win"
  artifactName: "drop"

stages:
  - stage: Build
    displayName: Build Next.js Artifact
    jobs:
      - job: Build
        displayName: Build and Package
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - bash: |
              echo "Build.SourcesDirectory=$(Build.SourcesDirectory)"
              pwd
              ls -la
            displayName: Show checkout location

          - bash: |
              set -euo pipefail

              CANDIDATE="$(Build.SourcesDirectory)"

              if [ -f "$CANDIDATE/package.json" ]; then
                ROOT="$CANDIDATE"
              elif [ -f "$CANDIDATE/$(Build.Repository.Name)/package.json" ]; then
                ROOT="$CANDIDATE/$(Build.Repository.Name)"
              else
                ROOT="$(find "$CANDIDATE" -maxdepth 4 -type f -name package.json -not -path '*/node_modules/*' | head -n 1 | xargs -r dirname)"
              fi

              if [ -z "${ROOT:-}" ] || [ ! -f "$ROOT/package.json" ]; then
                echo "Could not locate package.json under $CANDIDATE"
                find "$CANDIDATE" -maxdepth 3 -type d | sed -n '1,120p'
                exit 1
              fi

              echo "Resolved repo root: $ROOT"
              echo "##vso[task.setvariable variable=repoRoot]$ROOT"
            displayName: Resolve repository root

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - script: npm install
            displayName: Install dependencies
            workingDirectory: $(repoRoot)

          - script: npm run build
            displayName: Build frontend
            workingDirectory: $(repoRoot)

          - script: |
              set -euo pipefail

              APP_DIR="$(Build.ArtifactStagingDirectory)/app"
              STANDALONE_APP_DIR="src/frontend/.next/standalone/src/frontend"
              STANDALONE_NODE_MODULES_DIR="src/frontend/.next/standalone/node_modules"
              STANDALONE_ROOT_DIR="src/frontend/.next/standalone"

              rm -rf "$APP_DIR"
              mkdir -p "$APP_DIR"

              if [ ! -f "$STANDALONE_APP_DIR/server.js" ]; then
                echo "Standalone build output not found. Run 'npm run build' first."
                echo "Expected: $STANDALONE_APP_DIR/server.js"
                exit 1
              fi

              # Mirror IIS deployment file layout.
              cp -a "$STANDALONE_APP_DIR/.next" "$APP_DIR/.next"
              cp -a "$STANDALONE_APP_DIR/server.js" "$APP_DIR/server.js"

              if [ -f "$STANDALONE_APP_DIR/package.json" ]; then
                cp -a "$STANDALONE_APP_DIR/package.json" "$APP_DIR/package.json"
              elif [ -f "$STANDALONE_ROOT_DIR/package.json" ]; then
                cp -a "$STANDALONE_ROOT_DIR/package.json" "$APP_DIR/package.json"
              else
                cp -a package.json "$APP_DIR/package.json"
              fi

              if [ -d "$STANDALONE_NODE_MODULES_DIR" ]; then
                cp -a "$STANDALONE_NODE_MODULES_DIR" "$APP_DIR/node_modules"
              fi

              mkdir -p "$APP_DIR/.next"
              cp -a src/frontend/.next/static "$APP_DIR/.next/static"

              if [ -d src/frontend/public ]; then
                cp -a src/frontend/public "$APP_DIR/public"
              fi

              if [ -f src/frontend/web.config ]; then
                cp -a src/frontend/web.config "$APP_DIR/web.config"
              fi

              # Keep parity with IIS deployment output (without using .env.local in App Service).
              cp -a "$APP_DIR/server.js" "$APP_DIR/server.cjs"

              # IISNode on Windows App Service can provide PORT as a named pipe; avoid parseInt(PORT).
              if grep -q "parseInt(process.env.PORT, 10)" "$APP_DIR/server.cjs"; then
                sed -i -E "s/const currentPort = parseInt\(process\.env\.PORT, 10\) \|\| 3000/const currentPort = process.env.PORT || 3000/g" "$APP_DIR/server.cjs"
                echo "Patched server.cjs for IIS named-pipe PORT binding"
              fi

              rm -f "$APP_DIR/.env.local"
            displayName: Prepare deployable package
            workingDirectory: $(repoRoot)

          - script: |
              set -euo pipefail

              APP_DIR="$(Build.ArtifactStagingDirectory)/app"

              echo "Artifact layout preview (depth <= 3):"
              find "$APP_DIR" -maxdepth 3 -print | sed "s|^$APP_DIR|.|" | sort

              required_paths=(
                "$APP_DIR/.next"
                "$APP_DIR/.next/server"
                "$APP_DIR/.next/static"
                "$APP_DIR/node_modules"
                "$APP_DIR/server.js"
                "$APP_DIR/server.cjs"
                "$APP_DIR/package.json"
              )

              for path in "${required_paths[@]}"; do
                if [ ! -e "$path" ]; then
                  echo "Missing required artifact path: $path"
                  exit 1
                fi
              done

              if [ -e "$APP_DIR/.env.local" ]; then
                echo "Unexpected file present: $APP_DIR/.env.local"
                exit 1
              fi

              echo "Artifact verification passed."
            displayName: Verify artifact layout parity
            workingDirectory: $(repoRoot)

          - task: ArchiveFiles@2
            displayName: Archive package
            inputs:
              rootFolderOrFile: "$(Build.ArtifactStagingDirectory)/app"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
              replaceExistingArchive: true

          - publish: "$(Build.ArtifactStagingDirectory)/app.zip"
            displayName: Publish artifact
            artifact: $(artifactName)

  - stage: Deploy
    displayName: Deploy to Azure Web App (Windows)
    dependsOn: Build
    jobs:
      - deployment: DeployWindowsWebApp
        displayName: Deploy Windows Web App
        environment: develop-windows
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  displayName: Download build artifact
                  artifact: $(artifactName)

                - task: AzureAppServiceSettings@1
                  displayName: Configure App Service settings
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appName: $(windowsWebAppName)
                    appSettings: |
                      [
                        { "name": "WEBSITE_NODE_DEFAULT_VERSION", "value": "~24" },
                        { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false" },
                        { "name": "NODE_ENV", "value": "production" }
                      ]

                - task: AzureWebApp@1
                  displayName: Deploy to Azure App Service (Windows)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webApp
                    appName: $(windowsWebAppName)
                    package: "$(Pipeline.Workspace)/$(artifactName)/app.zip"