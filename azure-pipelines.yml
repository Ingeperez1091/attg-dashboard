trigger:
  branches:
    include:
      - develop

pr: none

variables:
  nodeVersion: "24.x"
  azureServiceConnection: "8287475a-4f2f-4710-91f6-3c9f9fb6f19e"
  linuxWebAppName: "att-dashboard"
  artifactName: "drop"

stages:
  - stage: Build
    displayName: Build Next.js Artifact
    jobs:
      - job: Build
        displayName: Build and Package
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)
              
          # - task: NodeTool@0
          #   displayName: Use Node.js $(nodeVersion)
          #   inputs:
          #     versionSpec: $(nodeVersion)

          - script: npm install
            displayName: Install dependencies
            workingDirectory: $(Build.SourcesDirectory)

          - script: npm run build
            displayName: Build frontend
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              set -euo pipefail

              APP_DIR="$(Build.ArtifactStagingDirectory)/app"
              mkdir -p "$APP_DIR"

              cp -R src/frontend/.next/standalone/src/frontend/* "$APP_DIR/"
              cp -R src/frontend/.next/standalone/node_modules "$APP_DIR/node_modules"

              mkdir -p "$APP_DIR/.next"
              cp -R src/frontend/.next/static "$APP_DIR/.next/static"

              if [ -d src/frontend/public ]; then
                cp -R src/frontend/public "$APP_DIR/public"
              fi
            displayName: Prepare deployable package
            workingDirectory: $(Build.SourcesDirectory)

          - task: ArchiveFiles@2
            displayName: Archive package
            inputs:
              rootFolderOrFile: "$(Build.ArtifactStagingDirectory)/app"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
              replaceExistingArchive: true

          - publish: "$(Build.ArtifactStagingDirectory)/app.zip"
            displayName: Publish artifact
            artifact: $(artifactName)

  - stage: Deploy
    displayName: Deploy to Azure Web App (Linux)
    dependsOn: Build
    jobs:
      - deployment: DeployLinuxWebApp
        displayName: Deploy Linux Web App
        environment: develop-linux
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  displayName: Download build artifact
                  artifact: $(artifactName)

                - task: AzureWebApp@1
                  displayName: Deploy to Azure App Service (Linux)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webAppLinux
                    appName: $(linuxWebAppName)
                    package: "$(Pipeline.Workspace)/$(artifactName)/app.zip"
                    startUpCommand: "node server.js"